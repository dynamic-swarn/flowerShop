<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      /* Hide scrollbar for Chrome, Safari */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      /* Hide scrollbar for IE, Edge, Firefox */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Text Slider Animations */
      @keyframes slideOutUp {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-20px); opacity: 0; }
      }
      @keyframes slideInDown {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      .slide-out-up {
        animation: slideOutUp 0.5s ease-in forwards;
      }
      .slide-in-down {
        animation: slideInDown 0.5s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <div
      class="relative bg-[#818D7F] w-full flex items-center justify-center px-4 py-3 overflow-hidden"
    >
      <!-- Light opacity flower in the navbar -->
      <div
        class="absolute opacity-10 text-white text-6xl md:text-8xl pointer-events-none rotate-12 right-4 md:right-32 drop-shadow-md"
      >
        🌺
      </div>
      <div
        class="absolute opacity-[0.15] text-white text-5xl md:text-6xl pointer-events-none -rotate-12 left-4 md:left-24 drop-shadow-md"
      >
        🌸
      </div>

      <div class="relative z-10 flex items-center gap-2 sm:gap-4">
        <!-- Logo -->
        <img src="asset/drg.png" class="h-10 sm:h-12 md:h-14" />

        <!-- Text -->
        <h1
          class="font-bold text-amber-50 font-serif text-[18px] sm:text-[24px] md:text-[30px]"
        >
          MAA DURGA FLORALS
        </h1>
      </div>
    </div>

    <div
      class="hidden md:flex bg-[#D9D9D9] w-full min-h-[2rem] flex items-center justify-center px-4 py-2"
    >
      <nav
        class="flex flex-wrap justify-center gap-x-4 gap-y-2 sm:gap-x-6 font-semibold text-sm sm:text-base"
      >
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Collection</a>
        <a href="#">Ocasion</a>
        <a href="#">Contact</a>
        <a href="#">Cart🛒</a>
      </nav>
    </div>

    <div class="flex md:hidden bg-[#D9D9D9] w-full px-2 py-3 mt-0">
      <div
        class="flex items-center gap-3 w-full overflow-x-auto scrollbar-hide"
      >
        <div class="flex flex-col items-center min-w-[60px]">
          <div
            class="h-12 w-12 rounded-full bg-[#818D7F] flex items-center justify-center"
          >
            <i class="fa-solid fa-home text-white text-xl"></i>
          </div>
          <span class="text-xs mt-1">Home</span>
        </div>

        <div class="flex flex-col items-center min-w-[60px]">
          <div
            class="h-12 w-12 rounded-full bg-[#818D7F] flex justify-center items-center"
          >
            <i class="fa-solid fa-list text-white text-xl"></i>
          </div>
          <span class="text-xs mt-1">Collection</span>
        </div>

        <div class="flex flex-col items-center min-w-[60px]">
          <div
            class="h-12 w-12 rounded-full bg-[#818D7F] flex justify-center items-center"
          >
            <i class="fa-solid fa-handshake text-white text-xl"></i>
          </div>
          <span class="text-xs mt-1">Services</span>
        </div>

        <div class="flex flex-col items-center min-w-[60px]">
          <div
            class="h-12 w-12 rounded-full bg-[#818D7F] flex justify-center items-center"
          >
            <i class="fa-solid fa-spa text-white text-xl"></i>
          </div>
          <span class="text-xs mt-1">Occasion</span>
        </div>

        <div class="flex flex-col items-center min-w-[60px]">
          <div
            class="h-12 w-12 rounded-full bg-[#818D7F] flex justify-center items-center"
          >
            <i class="fa-solid fa-phone text-white text-xl"></i>
          </div>
          <span class="text-xs mt-1">Contact</span>
        </div>

        <div class="flex flex-col items-center min-w-[60px]">
          <div
            class="h-12 w-12 rounded-full bg-[#818D7F] flex justify-center items-center"
          >
            <i class="fa-solid fa-cart-shopping text-white text-2xl"></i>
          </div>
          <span class="text-xs mt-1">Cart</span>
        </div>
      </div>
    </div>

    <div
      class="relative w-full flex flex-col md:flex-row items-center justify-center px-4 md:px-6 py-6 md:py-10 gap-6 md:gap-20 overflow-hidden"
    >
      <!-- Background -->
      <div
        class="absolute inset-0 bg-[url('asset/bg.png')] bg-center bg-contain md:bg-cover"
      ></div>
      <div class="absolute inset-0 bg-black/40"></div>

      <!-- Content -->
      <div
        class="relative z-10 flex flex-row items-center justify-center gap-6 md:gap-20 w-full"
      >
        <!-- Images -->
        <div class="relative flex justify-center items-center mx-2.5">
          <!-- Main Image Wrapper -->
          <div
            class="relative w-[140px] h-[170px] md:w-[320px] md:h-[420px] rounded-t-full border-4 border-yellow-200 overflow-hidden pointer-events-none"
          >
            <div
              id="main-track"
              class="flex w-full h-full transition-transform duration-700 ease-in-out"
              style="transform: translateX(0%)"
            >
              <!-- Slide 1 -->
              <img
                src="asset/Frame 4.png"
                class="min-w-full h-full object-cover pointer-events-auto"
              />
              <!-- Slide 2 -->
              <img
                src="asset/fest.jpeg"
                class="min-w-full h-full object-cover pointer-events-auto"
              />
              <!-- Slide 3 -->
              <img
                src="asset/bday1.jpeg"
                class="min-w-full h-full object-cover pointer-events-auto"
              />
              <!-- Slide 4 -->
              <img
                src=""
                class="min-w-full h-full object-cover pointer-events-auto"
              />
            </div>
          </div>

          <!-- Sub Image Wrapper -->
          <div
            class="absolute bottom-5 md:bottom-9 right-[-20px] md:right-[-37px] translate-y-[30%] w-[60px] h-[85px] md:w-[150px] md:h-[180px] rounded-t-full border-4 border-yellow-200 overflow-hidden pointer-events-none z-10"
          >
            <!-- Revealing solid cover -->
            <div
              id="sub-reveal-cover"
              class="absolute inset-0 bg-yellow-200 z-20 transition-transform duration-500 ease-in-out origin-left pointer-events-none"
              style="transform: scaleX(0)"
            ></div>

            <div
              id="sub-track"
              class="flex w-full h-full"
              style="transform: translateX(0%)"
            >
              <!-- Slide 1 -->
              <img
                src="asset/Frame 5.png"
                class="min-w-full h-full object-cover pointer-events-auto"
              />
              <!-- Slide 2 -->
              <img
                src="asset/festt.jpeg"
                class="min-w-full h-full object-cover pointer-events-auto"
              />
              <!-- Slide 3 -->
              <img
                src="asset/bday2.jpeg"
                class="min-w-full h-full object-cover pointer-events-auto"
              />
              <!-- Slide 4 -->
              <img
                src="asset/Rectangle 20 (2).png"
                class="min-w-full h-full object-cover pointer-events-auto"
              />
            </div>
          </div>
        </div>

        <!-- Text -->
        <div
          class="flex flex-col items-center md:items-start text-white text-center md:text-left gap-1 md:gap-2 w-[200px] md:w-[400px]"
        >
          <div class="flex items-start gap-3 h-[50px] md:h-[80px]">
            <i class="fa-solid fa-quote-left text-white text-sm md:text-xl mt-1"></i>
            <h4 id="quote-text" class="text-[12px] sm:text-[14px] overflow-hidden mt-1 md:mt-2 flex md:text-2xl font-semibold">
              Two souls, one heart, blooming together forever.
            </h4>
          </div>

          <div class="flex items-center -mt-2 md:-mt-4 gap-0.5 md:gap-3">
            <div class="h-[1px] w-6 md:w-10 bg-white"></div>
            <p class="text-[9px] md:text-sm whitespace-nowrap">With Maa Durga Florals</p>
            <div class="h-[1px] w-6 md:w-10 bg-white"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const totalSlides = 4;
      let currentSlide = 0;

      const mainTrack = document.getElementById("main-track");
      const subTrack = document.getElementById("sub-track");
      const subCover = document.getElementById("sub-reveal-cover");

      setInterval(() => {
        // 1. Cover the second frame with a yellow block (Swipe in from left)
        subCover.classList.remove("origin-right");
        subCover.classList.add("origin-left");
        subCover.style.transform = "scaleX(1)";

        setTimeout(() => {
          // Increment slide index, loop back to 0 at the end
          currentSlide = (currentSlide + 1) % totalSlides;
          const offset = -(currentSlide * 100);

          // Main track slides normally from right to left
          mainTrack.style.transform = `translateX(${offset}%)`;
          subTrack.style.transform = `translateX(${offset}%)`;

          setTimeout(() => {
            subCover.classList.remove("origin-left");
            subCover.classList.add("origin-right");
            subCover.style.transform = "scaleX(0)";
          }, 50);
        }, 500);
      }, 3500);
      const quotes = [
  "Two souls, one heart, blooming together forever.",
  "Every petal tells a story of love.",
  "Celebrate moments with flowers and fragrance.",
  "Where emotions bloom beautifully."
];

let i = 0;
const quote = document.getElementById("quote-text");

setInterval(() => {
  // Slide out to top
  quote.classList.remove("slide-in-down");
  quote.classList.add("slide-out-up");

  setTimeout(() => {
    // Change text and slide in from bottom
    i = (i + 1) % quotes.length;
    quote.textContent = quotes[i];
    
    quote.classList.remove("slide-out-up");
    quote.classList.add("slide-in-down");
  }, 500);
}, 3500);
    </script>
  </body>
</html>
